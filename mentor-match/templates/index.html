<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ghost Social · Mentor–Mentee Matches</title>
<style>
  :root{
    --ink:#15171c; --ink-2:#5b6472; --line:#e6e3dc; --bg:#f4f1ea; --card:#fffdf8;
    --accent:#b4532a; --accent-2:#1f6f6b; --chipbg:#efe9dd;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;color:var(--ink);
       background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);padding:26px 0 18px;display:flex;
         justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .kicker{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;letter-spacing:.16em;
          text-transform:uppercase;color:var(--accent)}
  h1{font-size:27px;margin:.2em 0 0;font-weight:600;letter-spacing:-.01em}
  .who{font-size:12px;color:var(--ink-2);margin-top:3px}
  .badge{display:inline-block;font-family:ui-monospace,monospace;font-size:10px;padding:2px 8px;
         border:1px solid var(--line);border-radius:999px;background:var(--chipbg);color:var(--ink-2);margin-left:6px}
  .badge.adm{background:var(--accent-2);color:#fff;border-color:var(--accent-2)}
  .controls{display:flex;gap:10px;align-items:center;margin:18px 0 14px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
  .seg button{font-family:inherit;font-size:13px;border:none;background:none;padding:8px 14px;cursor:pointer;color:var(--ink-2)}
  .seg button.on{background:var(--ink);color:#fff}
  input[type=search],input[type=password]{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);
        border-radius:9px;background:var(--card);flex:1;min-width:180px}
  .btn{font-family:inherit;font-size:13px;border:1px solid var(--ink);background:var(--ink);color:#fff;
       padding:8px 13px;border-radius:9px;cursor:pointer;text-decoration:none;white-space:nowrap}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.sm{font-size:12px;padding:5px 10px}
  .spacer{flex:1}
  .card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 16px;margin:9px 0;cursor:pointer}
  .row1{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .pair{font-size:15px}
  .pair .mn{font-weight:600}
  .pair .ar{color:var(--accent);font-family:ui-monospace,monospace;font-size:11px;margin:0 6px}
  .pair .st{color:var(--ink)}
  .em{display:block;font-size:11px;color:var(--ink-2);font-family:ui-monospace,monospace;margin-top:1px}
  .conf{font-family:ui-monospace,monospace;font-size:11px;padding:3px 8px;border-radius:999px;
        background:var(--accent-2);color:#fff;white-space:nowrap}
  .rat{margin:7px 0 0;color:#2b2f37;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.open .rat{white-space:normal}
  .cardacts{margin-top:9px;display:none}.card.open .cardacts{display:block}
  .um{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 16px;margin:7px 0;font-size:14px}
  .um .em{display:inline;margin-left:8px}
  .pager{display:flex;justify-content:center;align-items:center;gap:14px;margin:18px 0 50px;color:var(--ink-2);font-size:13px}
  .pager button{font-family:inherit;font-size:13px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 12px;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
  .empty{color:var(--ink-2);padding:30px 4px;text-align:center}
  .note{font-size:12px;color:var(--ink-2);background:#faf7f0;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin:10px 0}
  dialog{border:1px solid var(--line);border-radius:12px;padding:20px;max-width:340px;background:var(--card)}
  dialog::backdrop{background:rgba(20,20,20,.35)}
  footer{border-top:1px solid var(--line);color:var(--ink-2);font-size:12px;padding:16px 0 40px}
  @media(max-width:600px){.em{display:block}}
</style>
</head>
<body>
<header><div class="wrap" style="display:flex;justify-content:space-between;align-items:flex-end;width:100%">
  <div>
    <div class="kicker">UW Tech Exploration Lab · Ghost Social</div>
    <h1>Mentor–Mentee Matches <span class="badge" id="viewBadge">blind</span></h1>
    <div class="who" id="counts"></div>
  </div>
  <div style="display:flex;gap:8px">
    <a class="btn ghost sm" href="/api/report">PDF</a>
    {% if admin_enabled %}<button class="btn sm" id="adminBtn">Admin view</button>{% endif %}
  </div>
</div></header>

<div class="wrap">
  <div class="controls">
    <div class="seg" id="tabs">
      <button data-tab="matched" class="on">Matched</button>
      <button data-tab="unmatched">Unmatched</button>
    </div>
    <input type="search" id="q" placeholder="Search by mentor or student…">
    <span id="adminTools" style="display:none;gap:8px">
      <button class="btn sm" id="csvBtn">Export CSV</button>
      <button class="btn ghost sm" id="blindBtn">Back to blind</button>
    </span>
  </div>
  <div id="list"></div>
  <div class="pager" id="pager"></div>
</div>

<footer><div class="wrap" id="foot"></div></footer>

{% if admin_enabled %}
<dialog id="pwDlg">
  <form method="dialog" id="pwForm">
    <div style="font-weight:600;margin-bottom:6px">Coordinator access</div>
    <div class="note" style="margin-top:0">Shows real student + mentor names and emails. Not for blind review.</div>
    <input type="password" id="pwInput" placeholder="Password" style="width:100%" autofocus>
    <div id="pwErr" style="color:var(--accent);font-size:12px;min-height:16px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn ghost sm" value="cancel">Cancel</button>
      <button class="btn sm" id="pwGo" value="ok">Unlock</button>
    </div>
  </form>
</dialog>
{% endif %}

<script>
const $=s=>document.querySelector(s), el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const PAGE=12;
let PUB=null, ADM=null, admin=false, pw="", tab="matched", q="", page=1;

async function boot(){
  PUB=await (await fetch('/api/results')).json();
  $('#counts').textContent=`${PUB.counts.matched} matched · ${PUB.counts.unmatched} unmatched · ${PUB.generation_mode} run`;
  $('#foot').textContent=`Generated ${(PUB.generated_at||'').slice(0,19).replace('T',' ')} UTC · blind link carries no student names or emails.`;
  render();
}
$('#tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  [...$('#tabs').children].forEach(x=>x.classList.toggle('on',x===b));tab=b.dataset.tab;page=1;render();};
$('#q').oninput=e=>{q=e.target.value.toLowerCase().trim();page=1;render();};

function curList(){
  if(admin) return tab==='matched'?ADM.matches:ADM.unmatched;
  return tab==='matched'?PUB.matches:PUB.unmatched.map(s=>({student:s}));
}
function matchQ(item){
  if(!q) return true;
  const hay = admin
    ? [item.student_label,item.student_name,item.student_email,item.mentor_name,item.mentor_email]
    : [item.student,item.mentor];
  return hay.filter(Boolean).join(' ').toLowerCase().includes(q);
}

function render(){
  $('#viewBadge').textContent=admin?'admin':'blind';
  $('#viewBadge').className='badge'+(admin?' adm':'');
  const items=curList().filter(matchQ);
  const pages=Math.max(1,Math.ceil(items.length/PAGE));
  page=Math.min(page,pages);
  const slice=items.slice((page-1)*PAGE,page*PAGE);
  const L=$('#list'); L.innerHTML='';
  if(!slice.length){L.append(el('div','empty','No results.'));}
  else if(tab==='matched') slice.forEach(m=>L.append(matchedCard(m)));
  else slice.forEach(u=>L.append(unmatchedRow(u)));
  const P=$('#pager'); P.innerHTML='';
  if(pages>1){
    const prev=el('button',null,'‹ Prev');prev.disabled=page<=1;prev.onclick=()=>{page--;render();};
    const next=el('button',null,'Next ›');next.disabled=page>=pages;next.onclick=()=>{page++;render();};
    P.append(prev, el('span',null,`Page ${page} of ${pages} · ${items.length} shown`), next);
  } else if(items.length) P.append(el('span',null,`${items.length} shown`));
}

function matchedCard(m){
  const c=el('div','card');
  const student = admin
    ? `<span class="st">${esc(m.student_name)||esc(m.student_label)}<span class="em">${esc(m.student_email)}</span></span>`
    : `<span class="st">${esc(m.student)}</span>`;
  const mentor = admin
    ? `<span class="mn">${esc(m.mentor_name)}<span class="em">${esc(m.mentor_email)}</span></span>`
    : `<span class="mn">${esc(m.mentor)}</span>`;
  const conf = admin?m.confidence:m.confidence;
  c.innerHTML=`<div class="row1"><div class="pair">${mentor}<span class="ar">→</span>${student}</div>
    <span class="conf">conf ${esc(conf)}/10</span></div>
    <div class="rat">${esc(m.rationale)}</div>`;
  const acts=el('div','cardacts');
  if(admin){
    const cp=el('button','btn ghost sm','Copy contact info');
    cp.onclick=ev=>{ev.stopPropagation();
      const txt=`Mentor: ${m.mentor_name} <${m.mentor_email}>\nStudent: ${m.student_name} <${m.student_email}>`;
      navigator.clipboard.writeText(txt).then(()=>{cp.textContent='Copied ✓';setTimeout(()=>cp.textContent='Copy contact info',1200);});};
    acts.append(cp);
  }
  c.append(acts);
  c.onclick=()=>c.classList.toggle('open');
  return c;
}
function unmatchedRow(u){
  const r=el('div','um');
  if(admin) r.innerHTML=`${esc(u.student_name)||esc(u.student_label)}<span class="em">${esc(u.student_email)}</span>`;
  else r.textContent=u.student;
  return r;
}

// ── admin gating ──
{% if admin_enabled %}
const dlg=$('#pwDlg');
$('#adminBtn').onclick=()=>{$('#pwErr').textContent='';$('#pwInput').value='';dlg.showModal();};
$('#pwForm').addEventListener('submit',async e=>{
  if(e.submitter && e.submitter.value==='cancel') return;
  e.preventDefault();
  const tryPw=$('#pwInput').value;
  const r=await fetch('/api/admin',{headers:{'X-Admin-Password':tryPw}});
  if(r.status===401){$('#pwErr').textContent='Incorrect password.';return;}
  if(r.status===503){$('#pwErr').textContent='Roster not available on this instance.';return;}
  ADM=await r.json(); pw=tryPw; admin=true; page=1;
  $('#adminTools').style.display='inline-flex';
  $('#counts').textContent=`${ADM.matches.length} matched · ${ADM.unmatched.length} unmatched · full contact info`;
  $('#foot').textContent='Admin view — real names and emails. Do not share this screen for blind review.';
  dlg.close(); render();
});
$('#blindBtn').onclick=()=>{admin=false;ADM=null;pw="";page=1;
  $('#adminTools').style.display='none';
  $('#counts').textContent=`${PUB.counts.matched} matched · ${PUB.counts.unmatched} unmatched · ${PUB.generation_mode} run`;
  $('#foot').textContent='Blind link carries no student names or emails.';render();};
$('#csvBtn').onclick=async()=>{
  const r=await fetch('/api/admin/export.csv',{headers:{'X-Admin-Password':pw}});
  if(!r.ok){alert('Export failed.');return;}
  const blob=await r.blob(), a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='ghost_social_roster.csv';a.click();URL.revokeObjectURL(a.href);
};
{% endif %}

boot();
</script>
</body>
</html>
