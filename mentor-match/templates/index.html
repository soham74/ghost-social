<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ghost Social · Mentor–Mentee Matches</title>
<style>
  :root{
    --red:#C5050C; --red-700:#9b0a0a; --ink:#1c1d21; --muted:#6b7280;
    --line:#e7e8ea; --bg:#ffffff; --soft:#f7f8fa; --chip:#fbeceb;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);
       background:var(--bg);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px}
  .topbar{height:3px;background:var(--red)}
  header{padding:28px 0 18px;border-bottom:1px solid var(--line);display:flex;
         justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .brand .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--red)}
  h1{font-size:24px;margin:4px 0 0;font-weight:700;letter-spacing:-.02em}
  .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .actions{display:flex;gap:8px}
  .btn{font:inherit;font-size:13px;font-weight:500;border:1px solid var(--red);background:var(--red);color:#fff;
       padding:8px 14px;border-radius:8px;cursor:pointer;text-decoration:none;white-space:nowrap;transition:.12s}
  .btn:hover{background:var(--red-700);border-color:var(--red-700)}
  .btn.ghost{background:#fff;color:var(--ink);border-color:var(--line)}
  .btn.ghost:hover{background:var(--soft);border-color:#d4d6da}
  .btn.sm{font-size:12px;padding:5px 11px}
  .controls{display:flex;gap:12px;align-items:center;margin:20px 0 16px;flex-wrap:wrap}
  .tabs{display:inline-flex;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:3px}
  .tabs button{font:inherit;font-size:13px;font-weight:500;border:none;background:none;color:var(--muted);
               padding:6px 16px;border-radius:7px;cursor:pointer}
  .tabs button.on{background:#fff;color:var(--red);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .search{position:relative;flex:1;min-width:200px}
  .search input{width:100%;font:inherit;font-size:14px;padding:9px 12px 9px 34px;border:1px solid var(--line);
                border-radius:9px;background:#fff}
  .search input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--chip)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .card{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:10px 0;background:#fff;cursor:pointer;transition:.12s}
  .card:hover{border-color:#d4d6da;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .chead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .people{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .person{min-width:0}
  .person .lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .person .nm{font-weight:600;font-size:15px}
  .person .em{font-size:12.5px;color:var(--muted)}
  .person .em a{color:var(--red);text-decoration:none}
  .conn{align-self:center;color:var(--red);font-size:18px;line-height:1}
  .conf{flex:none;font-size:12px;font-weight:600;color:var(--red);background:var(--chip);
        border:1px solid #f2d6d4;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .rat{margin:10px 0 0;color:#33353a;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.open .rat{white-space:normal}
  .acts{margin-top:11px;display:none;gap:8px}.card.open .acts{display:flex}
  .um{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);
      border-radius:10px;padding:11px 16px;margin:8px 0;background:#fff;flex-wrap:wrap;gap:6px}
  .um .nm{font-weight:600;font-size:14.5px}.um .em{font-size:12.5px;color:var(--muted)}
  .pager{display:flex;justify-content:center;align-items:center;gap:16px;margin:22px 0 56px;color:var(--muted);font-size:13px}
  .pager button{font:inherit;font-size:13px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 13px;cursor:pointer}
  .pager button:hover:not(:disabled){background:var(--soft)}
  .pager button:disabled{opacity:.4;cursor:default}
  .empty{color:var(--muted);text-align:center;padding:46px 0}
  footer{border-top:1px solid var(--line);color:var(--muted);font-size:12px;padding:16px 0 40px}
  @media(max-width:560px){.chead{flex-direction:column}.conn{display:none}}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">UW Tech Exploration Lab</div>
      <h1>Mentor–Mentee Matches</h1>
      <div class="sub" id="counts"></div>
    </div>
    <div class="actions">
      <a class="btn ghost sm" href="/api/report">Export PDF</a>
      <a class="btn sm" href="/api/export.csv">Export CSV</a>
    </div>
  </header>

  <div class="controls">
    <div class="tabs" id="tabs">
      <button data-tab="matched" class="on">Matched</button>
      <button data-tab="unmatched">Unmatched</button>
    </div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="search" id="q" placeholder="Search by mentor or student name / email…">
    </div>
  </div>

  <div id="list"></div>
  <div class="pager" id="pager"></div>
</div>
<footer><div class="wrap" id="foot"></div></footer>

<script>
const $=s=>document.querySelector(s), el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const PAGE=12;
let DATA=null, tab='matched', q='', page=1;

async function boot(){
  DATA=await (await fetch('/api/results')).json();
  $('#counts').textContent=`${DATA.counts.matched} matched · ${DATA.counts.unmatched} unmatched · ${DATA.generation_mode} run`;
  $('#foot').textContent=`Generated ${(DATA.generated_at||'').slice(0,19).replace('T',' ')} UTC · internal coordinator view — real contact information.`;
  render();
}
$('#tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;
  [...$('#tabs').children].forEach(x=>x.classList.toggle('on',x===b));tab=b.dataset.tab;page=1;render();};
$('#q').oninput=e=>{q=e.target.value.toLowerCase().trim();page=1;render();};

function curList(){return tab==='matched'?(DATA.matches||[]):(DATA.unmatched||[]);}
function matchQ(it){
  if(!q) return true;
  const hay=tab==='matched'
    ? [it.mentor_name,it.mentor_email,it.student_name,it.student_email]
    : [it.student_name,it.student_email];
  return hay.filter(Boolean).join(' ').toLowerCase().includes(q);
}

function render(){
  const items=curList().filter(matchQ);
  const pages=Math.max(1,Math.ceil(items.length/PAGE));
  page=Math.min(page,pages);
  const slice=items.slice((page-1)*PAGE,page*PAGE);
  const L=$('#list'); L.innerHTML='';
  if(!slice.length){L.append(el('div','empty','No results.'));}
  else if(tab==='matched') slice.forEach(m=>L.append(card(m)));
  else slice.forEach(u=>L.append(umRow(u)));
  const P=$('#pager'); P.innerHTML='';
  if(pages>1){
    const prev=el('button',null,'‹ Prev');prev.disabled=page<=1;prev.onclick=()=>{page--;render();};
    const next=el('button',null,'Next ›');next.disabled=page>=pages;next.onclick=()=>{page++;render();};
    P.append(prev, el('span',null,`Page ${page} of ${pages} · ${items.length} shown`), next);
  } else if(items.length) P.append(el('span',null,`${items.length} shown`));
}

function person(lbl,name,email){
  return `<div class="person"><div class="lbl">${lbl}</div><div class="nm">${esc(name)}</div>
    <div class="em"><a href="mailto:${esc(email)}">${esc(email)}</a></div></div>`;
}
function card(m){
  const c=el('div','card');
  c.innerHTML=`<div class="chead">
      <div class="people">${person('Mentor',m.mentor_name,m.mentor_email)}
        <span class="conn">→</span>${person('Student',m.student_name,m.student_email)}</div>
      <span class="conf">confidence ${esc(m.confidence)}/10</span>
    </div>
    <div class="rat">${esc(m.rationale)}</div>
    <div class="acts"></div>`;
  const cp=el('button','btn ghost sm','Copy contact info');
  cp.onclick=ev=>{ev.stopPropagation();
    const txt=`Mentor: ${m.mentor_name} <${m.mentor_email}>\nStudent: ${m.student_name} <${m.student_email}>`;
    navigator.clipboard.writeText(txt).then(()=>{cp.textContent='Copied ✓';setTimeout(()=>cp.textContent='Copy contact info',1300);});};
  c.querySelector('.acts').append(cp);
  c.onclick=()=>c.classList.toggle('open');
  return c;
}
function umRow(u){
  const r=el('div','um');
  r.innerHTML=`<span class="nm">${esc(u.student_name)}</span><span class="em"><a href="mailto:${esc(u.student_email)}">${esc(u.student_email)}</a></span>`;
  return r;
}
boot();
</script>
</body>
</html>
